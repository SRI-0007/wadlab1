<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1 class="welcome">Create Your Account</h1>
  <div class="container">
    <div class="card">
      <h2>Register</h2>
<!--action="login.html" it means after completing this will redirect to login page-->
      <form action="login.html">
        <input type="text" class="form-control" placeholder="Username" minlength="6"><br>
        <input type="password" class="form-control" placeholder="Password"><br>
        <button class="btn">Register</button>
      </form>
      <p class="bottom-text">
        Already have an account? 
        <a href="login.html">Login</a>
      </p>
    </div>
  </div>
</body>
</html>
